<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoStore | Sign Up</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            background-color: var(--light-green);
            padding: 40px 0;
        }

        .auth-card {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .auth-card h2 {
            margin-bottom: 20px;
            color: var(--dark-green);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.2);
        }

        .auth-footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .auth-footer a {
            color: var(--primary-green);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <i class="ph-fill ph-leaf"></i> EcoStore
                </a>
                <div><a href="index.html"><i class="ph-fill ph-arrow-left"></i><span>Back to home</span></a></div>
            </nav>
        </div>
    </header>

    <!-- Signup Section -->
    <section class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p style="margin-bottom: 30px; color: var(--text-light);">Join us for a sustainable future</p>
            <form action="login.html"> <!-- Simulating signup success redirect to login -->
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" class="form-control" placeholder="At least 8 characters" required>
                        <span class="password-toggle-icon">
                            <i class="ph ph-eye"></i>
                        </span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" class="form-control" placeholder="Repeat Password" required>
                        <span class="password-toggle-icon">
                            <i class="ph ph-eye"></i>
                        </span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </section>

    <script src="assets/js/mobile-nav.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
