<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoStore | Profile Settings</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* ---- Dashboard page scoped styles ---- */

        /* Hide main site nav links on this page only */
        body.dashboard-layout .nav-links {
            display: none !important;
        }

        /* Clean header: brand left, hamburger right, flex aligned */
        body.dashboard-layout .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }

        body.dashboard-layout .navbar .logo {
            margin-left: 0;
        }

        body.dashboard-layout .navbar .sidebar-toggle {
            margin-right: 0;
        }

        @media (max-width: 768px) {
            body.dashboard-layout .navbar {
                padding: 12px 0;
            }
        }

        @media (max-width: 400px) {
            body.dashboard-layout .navbar {
                padding: 8px 0;
            }
        }

        /* Dashboard body background */
        .dashboard-container {
            padding: 40px 0;
            background-color: var(--light-green);
            min-height: calc(100vh - 130px);
        }

        /* Two-column grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 30px;
            align-items: start;
        }

        /* Sidebar — sticky */
        .sidebar {
            background: var(--white);
            padding: 28px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 80px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-menu li {
            margin-bottom: 6px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-dark);
            text-decoration: none;
            padding: 11px 14px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .sidebar-menu a i {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background-color: var(--light-green);
            color: var(--primary-green);
        }

        /* Logout link */
        .sidebar-menu .logout-link a {
            color: #e74c3c;
        }

        .sidebar-menu .logout-link a:hover {
            background-color: rgba(231, 76, 60, 0.08);
            color: #c0392b;
        }

        /* Main content */
        .main-content {
            background: var(--white);
            padding: 36px;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
        }

        .page-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .profile-form {
            max-width: 600px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
        }

        .btn-save {
            background-color: var(--primary-green);
            color: var(--white);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-save:hover {
            background-color: var(--dark-green);
        }

        /* Responsive: stack on tablet/mobile */
        @media (max-width: 992px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            /* sidebar position handled by global off-canvas CSS */
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="dashboard-layout">
    <div class="page-wrapper">
        <!-- Header: dashboard version — logo only + logout -->
        <header>
            <div class="container">
                <nav class="navbar">
                    <div class="sidebar-toggle"><i class="ph ph-list"></i></div>
                    <a href="index.html" class="logo">
                        <i class="ph-fill ph-leaf"></i> EcoStore
                    </a>
                    <!-- nav-links intentionally omitted on dashboard pages -->
                    <div class="nav-icons">
                        <a href="cart.html"><i class="ph ph-shopping-cart"></i></a>
                        <div class="user-dropdown-container">
                            <button class="user-dropdown-toggle"><i class="ph ph-user"></i></button>
                            <div class="user-dropdown-menu">
                                <a href="login.html" class="user-dropdown-item">Login / Sign Up</a>
                                <div class="user-dropdown-divider"></div>
                                <a href="admin-dashboard.html" class="user-dropdown-item">Admin Dashboard</a>
                                <a href="user-dashboard.html" class="user-dropdown-item">User Dashboard</a>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
        </header>

        <main class="dashboard-container">
            <div class="container">
                <div class="dashboard-grid">
                    <!-- Sidebar -->
                    <aside class="sidebar">
                        <ul class="sidebar-menu">
                            <li><a href="user-dashboard.html"><i class="ph ph-house"></i> Overview</a></li>
                            <li><a href="orders.html"><i class="ph ph-package"></i> My Orders</a></li>
                            <li><a href="wishlist.html"><i class="ph ph-heart"></i> Wishlist</a></li>
                            <li><a href="profile.html" class="active"><i class="ph ph-user"></i> Profile Settings</a>
                            </li>
                            <li class="logout-link"><a href="login.html"><i class="ph ph-sign-out"></i> Logout</a></li>
                        </ul>
                    </aside>

                    <!-- Content -->
                    <section class="main-content">
                        <div class="page-header">
                            <h2>Profile Settings</h2>
                            <p style="color: var(--text-light);">Update your personal information and account security.
                            </p>
                        </div>

                        <form class="profile-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>First Name</label>
                                    <input type="text" class="form-control" value="Alex" placeholder="First Name">
                                </div>
                                <div class="form-group">
                                    <label>Last Name</label>
                                    <input type="text" class="form-control" value="Johnson" placeholder="Last Name">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" class="form-control" value="alex@example.com" disabled>
                                <small style="color: var(--text-light);">Email cannot be changed.</small>
                            </div>
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" class="form-control" value="+1 234 567 890"
                                    placeholder="Phone Number">
                            </div>
                            <div class="form-group">
                                <label>Delivery Address</label>
                                <textarea class="form-control" rows="3"
                                    placeholder="Enter your full address">123 Green Way, Eco City, 45678</textarea>
                            </div>

                            <div
                                style="margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--border-color);">
                                <h3>Change Password</h3>
                                <div class="form-group" style="margin-top: 20px;">
                                    <label>Current Password</label>
                                    <input type="password" class="form-control" placeholder="••••••••">
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>New Password</label>
                                        <input type="password" class="form-control" placeholder="New Password">
                                    </div>
                                    <div class="form-group">
                                        <label>Confirm New Password</label>
                                        <input type="password" class="form-control" placeholder="Confirm Password">
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn-save">Save Changes</button>
                        </form>
                    </section>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer style="background: var(--dark-green); color: var(--white); padding: 40px 0; text-align: center;">
            <div class="container">
                <p>&copy; 2026 EcoStore. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/mobile-nav.js"></script>
</body>

</html>
